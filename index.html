<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRM Aura - Pós-Venda</title>
    
    <!-- CONFIGURAÇÕES PWA (Aplicativo Instalável) -->
    <meta name="application-name" content="CRM Aura">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CRM Aura">
    <meta name="theme-color" content="#312e81">
    
    <!-- LINKS PARA AS SUAS IMAGENS (Devem estar na mesma pasta no GitHub) -->
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link id="manifest" rel="manifest" href="">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .slot-machine {
            background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 15%, #ffffff 50%, #e2e8f0 85%, #f8fafc 100%);
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.1);
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

    <!-- GERADOR DE MANIFESTO PARA PWA -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const manifest = {
                "name": "CRM Aura Pós-Venda",
                "short_name": "CRM Aura",
                "description": "Sistema de Indicadores, Sorteios e Fidelidade",
                "start_url": "./index.html",
                "display": "standalone",
                "background_color": "#f8fafc",
                "theme_color": "#312e81",
                "icons": [
                    { "src": "icon-192.png", "sizes": "192x192", "type": "image/png" },
                    { "src": "icon-512.png", "sizes": "512x512", "type": "image/png" }
                ]
            };
            const stringManifest = JSON.stringify(manifest);
            const blob = new Blob([stringManifest], {type: 'application/json'});
            const manifestURL = URL.createObjectURL(blob);
            document.querySelector('#manifest').setAttribute('href', manifestURL);
        });
    </script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen selection:bg-indigo-200">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
            Gift, Hash, Users, Filter, Trophy, LogOut, Search, 
            AlertTriangle, Lock, Mail, Store, ChevronRight, ChevronDown, CheckCircle, 
            Banknote, CreditCard, QrCode, Clock, Check, Star, Award, MessageCircle,
            ChevronLeft, LayoutGrid, MoreHorizontal, X, BarChart3, TrendingUp, Package, Clock4, HeartHandshake, Calendar
        } from 'https://esm.sh/lucide-react@0.292.0';
        import confetti from 'https://esm.sh/canvas-confetti@1.6.0';

        // --- FIREBASE IMPORTS ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDQQcD2tzsVS8Xzy-GpHT897kB7EC-S8Ng",
            authDomain: "vendas-aura.firebaseapp.com",
            projectId: "vendas-aura",
            storageBucket: "vendas-aura.firebasestorage.app",
            messagingSenderId: "767983700810",
            appId: "1:767983700810:web:947c8713bd23fb8a078fb3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const APP_ID = 'vendas-aura-main';

        // --- HELPERS GERAIS ---
        const formatCurrency = (val) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val || 0);
        const parseMoney = (valStr) => {
            if (!valStr) return 0;
            if (typeof valStr === 'number') return valStr;
            const clean = valStr.replace(/\./g, '').replace(',', '.');
            return parseFloat(clean) || 0;
        };
        const maskMoney = (value) => {
            let v = value.replace(/\D/g, "");
            v = (v / 100).toFixed(2) + "";
            v = v.replace(".", ",");
            v = v.replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
            return v;
        };
        const formatDate = (dateStr) => {
            if (!dateStr) return '--/--/----';
            const isoDate = dateStr.split('T')[0];
            const [year, month, day] = isoDate.split('-');
            return `${day}/${month}/${year}`;
        };
        const calculateDaysAgo = (dateStr) => {
            if(!dateStr) return Infinity;
            const saleDate = new Date(dateStr.split('T')[0]);
            const today = new Date();
            const diffTime = Math.abs(today - saleDate);
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        };
        
        // Helpers para datas do filtro
        const getCurrentMonthStart = () => {
            const d = new Date();
            return new Date(d.getFullYear(), d.getMonth(), 1).toLocaleDateString('pt-BR', { year: 'numeric', month: '2-digit', day: '2-digit' }).split('/').reverse().join('-');
        };
        const getCurrentMonthEnd = () => {
            const d = new Date();
            return new Date(d.getFullYear(), d.getMonth() + 1, 0).toLocaleDateString('pt-BR', { year: 'numeric', month: '2-digit', day: '2-digit' }).split('/').reverse().join('-');
        };

        // --- LINKS DE WHATSAPP ---
        const getPointMessageLink = (phone, name, points, storeName) => {
            const clean = phone?.replace(/\D/g, '');
            if (!clean) return '#';
            const firstName = name.split(' ')[0];
            const emojiParty = '%F0%9F%8E%89'; 
            const emojiGift = '%F0%9F%8E%81';  
            const text = encodeURIComponent(`Olá ${firstName}, tudo bem? `) + emojiParty + encodeURIComponent(`\nPassando para te avisar que ganhou mais um ponto no nosso *Plano Fidelidade* da *${storeName}*!\n\nVocê já tem *${points} de 7 pontos*. Continue a comprar para resgatar o seu prêmio! `) + emojiGift;
            return `https://wa.me/55${clean}?text=${text}`;
        };

        const getRewardMessageLink = (phone, name, rewardValue, storeName) => {
            const clean = phone?.replace(/\D/g, '');
            if (!clean) return '#';
            const firstName = name.split(' ')[0];
            const emojiTrophy = '%F0%9F%8F%86';   
            const emojiSparkles = '%E2%9C%A8';    
            const text = encodeURIComponent(`Parabéns ${firstName}! `) + emojiTrophy + encodeURIComponent(`\nCompletou *7 pontos* no Plano Fidelidade da *${storeName}*!\n\nGanhou um crédito de *${formatCurrency(rewardValue)}* para trocar por produtos.\nVenha nos visitar e resgatar o seu prêmio! `) + emojiSparkles;
            return `https://wa.me/55${clean}?text=${text}`;
        };

        const getVipMessageLink = (phone, name, storeName) => {
            const clean = phone?.replace(/\D/g, '');
            if (!clean) return '#';
            const firstName = name.split(' ')[0];
            const emojiStar = '%E2%AD%90'; 
            const emojiHeart = '%F0%9F%92%96'; 
            const text = encodeURIComponent(`Olá ${firstName}, tudo bem? Passando para te agradecer! `) + emojiHeart + encodeURIComponent(`\nVocê é um dos nossos clientes VIP na *${storeName}*. É uma honra ter você com a gente. Como forma de agradecimento, temos algo especial para sua próxima compra! `) + emojiStar;
            return `https://wa.me/55${clean}?text=${text}`;
        };

        const getMissYouMessageLink = (phone, name, storeName) => {
            const clean = phone?.replace(/\D/g, '');
            if (!clean) return '#';
            const firstName = name.split(' ')[0];
            const emojiSad = '%F0%9F%A5%BA'; 
            const emojiBag = '%F0%9F%9B%8D%EF%B8%8F'; 
            const text = encodeURIComponent(`Olá ${firstName}! Faz um tempinho que não te vemos por aqui na *${storeName}*. `) + emojiSad + encodeURIComponent(`\nSentimos a sua falta! Chegaram várias novidades incríveis, que tal dar uma olhadinha? Temos uma condição especial para você voltar! `) + emojiBag;
            return `https://wa.me/55${clean}?text=${text}`;
        };

        const getFeedbackMessageLink = (phone, name, storeName) => {
            const clean = phone?.replace(/\D/g, '');
            if (!clean) return '#';
            const firstName = name.split(' ')[0];
            const emojiSmile = '%F0%9F%98%8A'; 
            const text = encodeURIComponent(`Olá ${firstName}, muito obrigado pela sua compra recente na *${storeName}*! `) + emojiSmile + encodeURIComponent(`\nEsperamos que esteja a gostar dos seus produtos. Está tudo certinho? Qualquer dúvida ou se precisar de ajuda, estamos à disposição!`);
            return `https://wa.me/55${clean}?text=${text}`;
        };

        // --- COMPONENTES DE UI ---
        const DateRangeFilter = ({ period, startDate, endDate, onPeriodChange, onStartChange, onEndChange }) => {
            const [expanded, setExpanded] = useState(false);
            return (
                <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 mb-6">
                    <div className="flex justify-between items-center cursor-pointer" onClick={() => setExpanded(!expanded)}>
                        <div className="flex items-center gap-2">
                            <Calendar size={18} className="text-indigo-500" />
                            <span className="text-sm font-bold text-slate-700">
                                Filtro de Período: {period === 'month' ? "Mês Atual" : "Personalizado"}
                            </span>
                        </div>
                        <div className="flex items-center gap-3">
                            <span className="text-xs text-slate-400 hidden sm:block">
                                {formatDate(startDate)} a {formatDate(endDate)}
                            </span>
                            <ChevronDown size={16} className={`text-slate-300 transition-transform ${expanded ? 'rotate-180' : ''}`} />
                        </div>
                    </div>
                    {expanded && (
                        <div className="mt-4 pt-4 border-t border-slate-50 space-y-3 animate-fade-in">
                            <div className="flex gap-2">
                                <button onClick={() => onPeriodChange('month')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-colors ${period === 'month' ? 'bg-indigo-600 text-white shadow-md shadow-indigo-200' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>Mês Atual</button>
                                <button onClick={() => onPeriodChange('custom')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-colors ${period === 'custom' ? 'bg-indigo-600 text-white shadow-md shadow-indigo-200' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>Personalizar Datas</button>
                            </div>
                            {period === 'custom' && (
                                <div className="grid grid-cols-2 gap-3 mt-3">
                                    <div>
                                        <label className="text-[10px] uppercase font-bold text-slate-400 block mb-1">Data Inicial</label>
                                        <input type="date" className="w-full p-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none text-slate-600" value={startDate} onChange={e => onStartChange(e.target.value)} />
                                    </div>
                                    <div>
                                        <label className="text-[10px] uppercase font-bold text-slate-400 block mb-1">Data Final</label>
                                        <input type="date" className="w-full p-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none text-slate-600" value={endDate} onChange={e => onEndChange(e.target.value)} />
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const Pagination = ({ totalItems, itemsPerPage, currentPage, onPageChange }) => {
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            const [showAllPagesModal, setShowAllPagesModal] = useState(false);

            if (totalPages <= 1) return null;

            const renderPageNumbers = () => {
                const pages = [];
                if (totalPages <= 7) {
                    for (let i = 1; i <= totalPages; i++) pages.push(i);
                } else {
                    if (currentPage <= 4) {
                        pages.push(1, 2, 3, 4, 5, '...', totalPages);
                    } else if (currentPage >= totalPages - 3) {
                        pages.push(1, '...', totalPages - 4, totalPages - 3, totalPages - 2, totalPages - 1, totalPages);
                    } else {
                        pages.push(1, '...', currentPage - 1, currentPage, currentPage + 1, '...', totalPages);
                    }
                }
                return pages;
            };

            return (
                <div className="flex justify-center items-center gap-2 mt-8 py-2 select-none animate-fade-in">
                    <button 
                        onClick={() => onPageChange(currentPage - 1)} 
                        disabled={currentPage === 1}
                        className="p-2 rounded-lg hover:bg-slate-200 text-slate-500 disabled:opacity-30 disabled:hover:bg-transparent transition-colors"
                    ><ChevronLeft size={20} /></button>

                    {renderPageNumbers().map((page, index) => {
                        if (page === '...') {
                            return <button 
                                key={`ellipsis-${index}`}
                                onClick={() => setShowAllPagesModal(true)}
                                className="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-100 text-slate-400 transition-colors"
                            ><MoreHorizontal size={16} /></button>;
                        }
                        return <button
                            key={page}
                            onClick={() => onPageChange(page)}
                            className={`w-8 h-8 flex items-center justify-center rounded-lg font-bold text-sm transition-colors ${currentPage === page ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-600 hover:bg-white hover:shadow-sm border border-transparent hover:border-slate-100'}`}
                        >{page}</button>;
                    })}

                    <button 
                        onClick={() => onPageChange(currentPage + 1)} 
                        disabled={currentPage === totalPages}
                        className="p-2 rounded-lg hover:bg-slate-200 text-slate-500 disabled:opacity-30 disabled:hover:bg-transparent transition-colors"
                    ><ChevronRight size={20} /></button>

                    {showAllPagesModal && (
                        <div className="fixed inset-0 bg-black/50 z-[80] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl w-full max-w-sm p-4 animate-fade-in shadow-2xl">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-bold text-slate-800 flex items-center gap-2"><LayoutGrid size={18} /> Navegar para página</h3>
                                    <button onClick={() => setShowAllPagesModal(false)} className="p-1 hover:bg-slate-100 rounded-full"><X size={20} /></button>
                                </div>
                                <div className="grid grid-cols-5 gap-2 max-h-60 overflow-y-auto p-1 hide-scrollbar">
                                    {Array.from({ length: totalPages }, (_, i) => i + 1).map(p => (
                                        <button
                                            key={p}
                                            onClick={() => { onPageChange(p); setShowAllPagesModal(false); }}
                                            className={`p-2 rounded-lg font-bold text-sm border ${currentPage === p ? 'bg-indigo-600 text-white border-indigo-600' : 'border-slate-100 text-slate-600 hover:bg-slate-50'}`}
                                        >{p}</button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const MoneyInput = ({ value, onChange, placeholder, className, disabled }) => {
            const [display, setDisplay] = useState(typeof value === 'number' ? maskMoney(value.toFixed(2)) : value);
            useEffect(() => { if (typeof value === 'number') setDisplay(maskMoney(value.toFixed(2))); }, [value]);
            const handleChange = (e) => { const m = maskMoney(e.target.value); setDisplay(m); onChange(m); };
            return (
                <div className="relative w-full">
                    <span className="absolute left-3 top-3 text-slate-400 font-bold">R$</span>
                    <input type="text" inputMode="numeric" disabled={disabled} className={className} placeholder={placeholder || "0,00"} value={display} onChange={handleChange} />
                </div>
            );
        };

        const MultiSelectDropdown = ({ options, selected, onChange, placeholder, disabled }) => {
            const [isOpen, setIsOpen] = useState(false);
            const dropdownRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const displayValue = selected.length === 0 
                ? placeholder 
                : selected.length === options.length 
                    ? "Todas as Formas" 
                    : `${selected.length} selecionada(s)`;

            return (
                <div className="relative w-full" ref={dropdownRef}>
                    <div 
                        className={`w-full p-3 border rounded-xl bg-slate-50 flex justify-between items-center transition-colors ${disabled ? 'opacity-60 cursor-not-allowed border-slate-200' : 'cursor-pointer border-slate-200 hover:border-indigo-300'}`}
                        onClick={() => !disabled && setIsOpen(!isOpen)}
                    >
                        <span className={`text-sm ${selected.length === 0 ? 'text-slate-500' : 'text-slate-800 font-medium'}`}>
                            {displayValue}
                        </span>
                        <ChevronDown size={18} className={`text-slate-400 transition-transform ${isOpen ? 'rotate-180' : ''}`} />
                    </div>

                    {isOpen && !disabled && (
                        <div className="absolute z-50 w-full mt-2 bg-white border border-slate-200 rounded-xl shadow-xl max-h-60 overflow-y-auto animate-fade-in py-1">
                            {options.map(opt => {
                                const isSelected = selected.includes(opt.id);
                                return (
                                    <div 
                                        key={opt.id}
                                        className="px-4 py-3 flex items-center gap-3 hover:bg-slate-50 cursor-pointer transition-colors"
                                        onClick={() => onChange(opt.id)}
                                    >
                                        <div className={`w-5 h-5 rounded border flex items-center justify-center transition-colors ${isSelected ? 'bg-indigo-600 border-indigo-600' : 'border-slate-300 bg-white'}`}>
                                            {isSelected && <Check size={14} className="text-white" />}
                                        </div>
                                        <span className="text-sm text-slate-700">{opt.label}</span>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        };

        // --- TELA DE LOGIN ---
        const AuthScreen = () => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleLogin = async (e) => {
                e.preventDefault();
                if (!email || !password) return setError("Preencha e-mail e senha.");
                setLoading(true); setError('');
                try {
                    await signInWithEmailAndPassword(auth, email, password);
                } catch (e) {
                    setError("Usuário ou senha incorretos.");
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-indigo-500 to-purple-700">
                    <div className="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md animate-fade-in">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                <Trophy className="text-indigo-600" size={32} />
                            </div>
                            <h1 className="text-2xl font-bold text-slate-800">CRM & Fidelidade</h1>
                            <p className="text-slate-400 text-sm">Faça login com a sua conta Aura</p>
                        </div>
                        {error && <div className="bg-red-50 text-red-500 p-3 rounded-xl text-sm mb-4 flex items-center gap-2"><AlertTriangle size={16} />{error}</div>}
                        
                        <form onSubmit={handleLogin} className="space-y-4">
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">E-mail</label>
                                <div className="relative">
                                    <Mail className="absolute left-3 top-3 text-slate-400" size={20} />
                                    <input type="email" autoFocus className="w-full p-3 pl-10 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="seu@email.com" value={email} onChange={e => setEmail(e.target.value)} />
                                </div>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">Senha</label>
                                <div className="relative">
                                    <Lock className="absolute left-3 top-3 text-slate-400" size={20} />
                                    <input type="password" className="w-full p-3 pl-10 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="••••••••" value={password} onChange={e => setPassword(e.target.value)} />
                                </div>
                            </div>
                            <button type="submit" disabled={loading} className="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition-colors shadow-lg shadow-indigo-200 disabled:opacity-50 mt-2">
                                {loading ? "A entrar..." : "Acessar Sistema"}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // --- DASHBOARD CRM (INDICADORES) ---
        const DashboardCRM = ({ customers, sales, storeName }) => {
            
            // Estado do Filtro
            const [dashPeriod, setDashPeriod] = useState('month');
            const [dashStartDate, setDashStartDate] = useState(getCurrentMonthStart());
            const [dashEndDate, setDashEndDate] = useState(getCurrentMonthEnd());

            useEffect(() => {
                if (dashPeriod === 'month') {
                    setDashStartDate(getCurrentMonthStart());
                    setDashEndDate(getCurrentMonthEnd());
                }
            }, [dashPeriod]);

            // Processamento dos dados com base no filtro
            const stats = useMemo(() => {
                // 1. Filtrar Vendas pelo Período (Apenas para KPIs, Produtos e VIPs)
                const periodSales = sales.filter(s => {
                    const saleDate = s.saleDate.split('T')[0];
                    return saleDate >= dashStartDate && saleDate <= dashEndDate;
                });

                let totalRevenue = 0;
                let activeCustomersSet = new Set();
                let productMap = {};
                let customerPeriodMap = {};

                // Inicializar mapa de clientes para o período
                customers.forEach(c => {
                    customerPeriodMap[c.id] = { ...c, totalSpent: 0, purchaseCount: 0 };
                });

                // Calcular vendas do período
                periodSales.forEach(s => {
                    totalRevenue += s.totalPrice || 0;
                    if (s.customerId) activeCustomersSet.add(s.customerId);

                    if (customerPeriodMap[s.customerId]) {
                        customerPeriodMap[s.customerId].totalSpent += s.totalPrice || 0;
                        customerPeriodMap[s.customerId].purchaseCount += 1;
                    }

                    if (s.items && Array.isArray(s.items)) {
                        s.items.forEach(item => {
                            if (!item.productName) return;
                            if (!productMap[item.productName]) {
                                productMap[item.productName] = { name: item.productName, quantity: 0, revenue: 0 };
                            }
                            productMap[item.productName].quantity += (item.quantity || 1);
                            productMap[item.productName].revenue += (item.price || 0);
                        });
                    }
                });

                const totalSalesCount = periodSales.length;
                const averageTicket = totalSalesCount > 0 ? totalRevenue / totalSalesCount : 0;
                
                const topProducts = Object.values(productMap)
                    .sort((a, b) => b.quantity - a.quantity)
                    .slice(0, 5); 

                const vipCustomers = Object.values(customerPeriodMap)
                    .filter(c => c.purchaseCount > 0)
                    .sort((a, b) => b.totalSpent - a.totalSpent)
                    .slice(0, 10);

                // 2. INDICADORES GLOBAIS (Não dependem do filtro de datas, dependem do status "real" do cliente)
                let customerGlobalMap = {};
                customers.forEach(c => {
                    customerGlobalMap[c.id] = { ...c, lastPurchase: null, purchaseCount: 0 };
                });

                sales.forEach(s => {
                    if (customerGlobalMap[s.customerId]) {
                        customerGlobalMap[s.customerId].purchaseCount += 1;
                        if (!customerGlobalMap[s.customerId].lastPurchase || s.saleDate > customerGlobalMap[s.customerId].lastPurchase) {
                            customerGlobalMap[s.customerId].lastPurchase = s.saleDate;
                        }
                    }
                });

                const allGlobalCustomers = Object.values(customerGlobalMap).filter(c => c.purchaseCount > 0);

                const recentCustomers = [...allGlobalCustomers]
                    .sort((a, b) => new Date(b.lastPurchase) - new Date(a.lastPurchase))
                    .slice(0, 10);

                const idleCustomers = [...allGlobalCustomers]
                    .filter(c => calculateDaysAgo(c.lastPurchase) > 30)
                    .sort((a, b) => calculateDaysAgo(b.lastPurchase) - calculateDaysAgo(a.lastPurchase))
                    .slice(0, 10);

                return {
                    totalRevenue, totalSalesCount, averageTicket, activeCustomers: activeCustomersSet.size,
                    topProducts, vipCustomers, recentCustomers, idleCustomers
                };
            }, [customers, sales, dashStartDate, dashEndDate]);

            return (
                <div className="space-y-6 animate-fade-in">
                    
                    {/* Filtro de Datas Global do Dashboard */}
                    <DateRangeFilter

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">

                            {/* Ranking VIP */}
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">

                                <div className="p-0">

                                                <div>

                                                    </div>

        // --- COMPONENTE PLANO FIDELIDADE ---
        const LoyaltyProgram = ({ customers, sales, storeName }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [currentPage, setCurrentPage] = useState(1);
            const ITEMS_PER_PAGE = 9; 

            useEffect(() => { setCurrentPage(1); }, [searchTerm]);

            const loyaltyData = useMemo(() => {
                const data = customers.map(customer => {
                    const eligibleSales = sales
                        .filter(s => s.customerId === customer.id && (s.saleType === 'direct' || (s.saleType === 'prazo' && s.status === 'completed')))
                        .sort((a, b) => a.saleDate.localeCompare(b.saleDate)); 

                    let currentCycle = [];
                    let earnedRewards = [];

                    eligibleSales.forEach(sale => {
                        currentCycle.push(sale.totalPrice || 0);
                        
                        if (currentCycle.length === 7) {
                            const totalAmount = currentCycle.reduce((acc, val) => acc + val, 0);
                            earnedRewards.push({
                                averageValue: totalAmount / 7,
                                date: sale.saleDate,
                            });
                            currentCycle = [];
                        }
                    });

                    const currentPoints = currentCycle.length;
                    const accumulatedValue = currentCycle.reduce((acc, val) => acc + val, 0);
                    const currentAverage = currentPoints > 0 ? (accumulatedValue / currentPoints) : 0;

                    return {
                        ...customer,
                        points: currentPoints,
                        currentAverage,
                        earnedRewards
                    };
                });

                return data.sort((a, b) => {
                    if (b.earnedRewards.length !== a.earnedRewards.length) {
                        return b.earnedRewards.length - a.earnedRewards.length;
                    }
                    return b.points - a.points;
                });

            }, [customers, sales]);

            const filteredData = loyaltyData.filter(c => c.name.toLowerCase().includes(searchTerm.toLowerCase()));
            const paginatedData = filteredData.slice((currentPage - 1) * ITEMS_PER_PAGE, currentPage * ITEMS_PER_PAGE);

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-5">
                            <div>
                                <h3 className="font-bold text-slate-800 flex items-center gap-2 text-xl mb-1">
                                    <Star size={24} className="text-yellow-500 fill-yellow-500" /> Plano Fidelidade
                                </h3>
                                <p className="text-sm text-slate-500 leading-relaxed">
                                    Compras à vista ou <b>Fiado Quitado</b> valem <b>1 ponto</b>. <br className="hidden md:block"/>
                                    Ao atingir <b>7 pontos</b>, o cliente ganha um crédito da média dessas compras.
                                </p>
                            </div>
                        </div>
                        
                        <div className="relative">
                            <Search className="absolute left-3 top-3.5 text-slate-400" size={18} />
                            <input 
                                className="w-full p-3.5 pl-10 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-colors" 
                                placeholder="Procurar cliente por nome..." 
                                value={searchTerm} 
                                onChange={e => setSearchTerm(e.target.value)} 
                            />
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                        {paginatedData.length === 0 ? (
                            <div className="col-span-full py-16 text-center text-slate-400 bg-white rounded-2xl border border-dashed border-slate-300">
                                <Star size={48} className="mx-auto mb-3 text-slate-200" />
                                <p className="font-medium text-lg">Nenhum cliente encontrado.</p>
                            </div>
                        ) : (
                            paginatedData.map(c => (
                                <div key={c.id} className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-col transition-shadow hover:shadow-md">
                                    <div className="p-5 border-b border-slate-50">
                                        <h4 className="font-bold text-slate-800 text-lg line-clamp-1">{c.name}</h4>
                                        <p className="text-sm text-slate-500">{c.phone || 'Sem contacto'}</p>
                                    </div>
                                    
                                    <div className="p-5 flex-1 flex flex-col justify-center">
                                        <div className="flex justify-between items-end mb-3">
                                            <span className="text-xs font-bold text-slate-400 uppercase tracking-wider">Pontos do Ciclo</span>
                                            <span className="text-sm font-black text-indigo-600 bg-indigo-50 px-2 py-1 rounded-lg">{c.points}/7</span>
                                        </div>
                                        
                                        <div className="flex gap-1.5 justify-between mb-5">
                                            {[...Array(7)].map((_, i) => (
                                                <div key={i} className={`flex-1 aspect-square rounded-full flex items-center justify-center transition-all duration-300 ${i < c.points ? 'bg-indigo-600 shadow-md shadow-indigo-200 scale-105' : 'bg-slate-100'}`}>
                                                    <Star size={12} className={i < c.points ? 'text-white fill-white' : 'text-slate-300'} />
                                                </div>
                                            ))}
                                        </div>

                                        {c.points > 0 && (
                                            <div className="bg-slate-50 p-3 rounded-xl border border-slate-100 flex justify-between items-center mb-4">
                                                <p className="text-xs font-medium text-slate-500">Média em acumulação:</p>
                                                <p className="font-black text-slate-700">{formatCurrency(c.currentAverage)}</p>
                                            </div>
                                        )}
                                        {c.points === 0 && c.earnedRewards.length === 0 && (
                                            <p className="text-sm text-center text-slate-400 py-2 italic mb-4">Ainda não iniciou o ciclo.</p>
                                        )}

                                        {c.points > 0 && c.phone && (
                                            <a 
                                                href={getPointMessageLink(c.phone, c.name, c.points, storeName)} 
                                                target="_blank" rel="noreferrer"
                                                className="w-full flex items-center justify-center gap-2 py-2.5 bg-[#25D366] text-white rounded-xl text-sm font-bold hover:bg-[#1DA851] transition-colors shadow-sm mt-auto"
                                            >
                                                <MessageCircle size={18} /> Avisar Ponto no Whats
                                            </a>
                                        )}
                                    </div>

                                    {c.earnedRewards.length > 0 && (
                                        <div className="bg-gradient-to-br from-yellow-400 to-yellow-500 p-5 text-yellow-900 mt-auto shadow-inner">
                                            <div className="flex items-center gap-2 mb-3">
                                                <Award size={20} className="fill-yellow-300" />
                                                <span className="font-black text-sm uppercase tracking-wide">Créditos Disponíveis ({c.earnedRewards.length})</span>
                                            </div>
                                            <div className="space-y-2.5 max-h-40 overflow-y-auto hide-scrollbar pr-1">
                                                {c.earnedRewards.map((reward, idx) => (
                                                    <div key={idx} className="bg-white/30 backdrop-blur-md p-3 rounded-xl flex justify-between items-center border border-yellow-200/50 shadow-sm">
                                                        <div>
                                                            <p className="text-xs font-bold opacity-80 uppercase">Gerado em</p>
                                                            <p className="text-sm font-semibold">{formatDate(reward.date)}</p>
                                                        </div>
                                                        <div className="flex items-center gap-3">
                                                            <span className="font-black text-lg bg-white/40 px-3 py-1 rounded-lg">{formatCurrency(reward.averageValue)}</span>
                                                            
                                                            {c.phone && (
                                                                <a 
                                                                    href={getRewardMessageLink(c.phone, c.name, reward.averageValue, storeName)}
                                                                    target="_blank" rel="noreferrer"
                                                                    className="bg-[#25D366] text-white p-2.5 rounded-lg hover:bg-[#1DA851] transition-colors shadow-sm"
                                                                    title="Avisar sobre o Prêmio"
                                                                >
                                                                    <MessageCircle size={18} />
                                                                </a>
                                                            )}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))
                        )}
                    </div>
                    
                    <Pagination 
                        totalItems={filteredData.length} 
                        itemsPerPage={ITEMS_PER_PAGE} 
                        currentPage={currentPage} 
                        onPageChange={setCurrentPage} 
                    />
                </div>
            );
        };

        // --- COMPONENTE DE SORTEIO POR CLIENTES ---
        const CustomerDraw = ({ customers, sales }) => {
            const [selectedMethods, setSelectedMethods] = useState([]); 
            const [minSpent, setMinSpent] = useState('');
            const [minPurchases, setMinPurchases] = useState(1);
            
            const [isDrawing, setIsDrawing] = useState(false);
            const [currentName, setCurrentName] = useState('Pronto para sortear!');
            const [winner, setWinner] = useState(null);

            const paymentOptions = [
                { id: 'prazo', label: 'A Prazo' },
                { id: 'pix', label: 'PIX' },
                { id: 'credit', label: 'Crédito' },
                { id: 'debit', label: 'Débito' },
                { id: 'money', label: 'Dinheiro' }
            ];

            const toggleMethod = (methodId) => {
                if (isDrawing) return;
                setSelectedMethods(prev => 
                    prev.includes(methodId) 
                        ? prev.filter(m => m !== methodId)
                        : [...prev, methodId]
                );
            };

            const customerStats = useMemo(() => {
                const stats = {};
                customers.forEach(c => {
                    stats[c.id] = { ...c, totalSpent: 0, purchaseCount: 0, methods: new Set() };
                });
                sales.forEach(s => {
                    if (stats[s.customerId]) {
                        stats[s.customerId].totalSpent += s.totalPrice || 0;
                        stats[s.customerId].purchaseCount += 1;
                        if (s.saleType === 'prazo') stats[s.customerId].methods.add('prazo');
                        if (s.saleType === 'direct' && s.paymentMethod) stats[s.customerId].methods.add(s.paymentMethod);
                    }
                });
                return stats;
            }, [customers, sales]);

            const eligibleCustomers = useMemo(() => {
                const minVal = parseMoney(minSpent);
                const minCount = parseInt(minPurchases) || 1;

                return Object.values(customerStats).filter(c => {
                    if (c.purchaseCount < minCount) return false;
                    if (minVal > 0 && c.totalSpent < minVal) return false;
                    if (selectedMethods.length > 0) {
                        const hasMatch = selectedMethods.some(method => c.methods.has(method));
                        if (!hasMatch) return false;
                    }
                    return true;
                });
            }, [customerStats, selectedMethods, minSpent, minPurchases]);

            const triggerConfetti = () => {
                const duration = 3 * 1000;
                const end = Date.now() + duration;

                const frame = () => {
                    confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#4f46e5', '#eab308', '#ffffff'] });
                    confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#4f46e5', '#eab308', '#ffffff'] });
                    if (Date.now() < end) requestAnimationFrame(frame);
                };
                frame();
            };

            const startDraw = () => {
                if (eligibleCustomers.length === 0) return;
                setIsDrawing(true);
                setWinner(null);

                let iterations = 0;
                const maxIterations = 30; 
                
                const interval = setInterval(() => {
                    const randomIdx = Math.floor(Math.random() * eligibleCustomers.length);
                    setCurrentName(eligibleCustomers[randomIdx].name);
                    iterations++;

                    if (iterations >= maxIterations) {
                        clearInterval(interval);
                        const finalWinner = eligibleCustomers[Math.floor(Math.random() * eligibleCustomers.length)];
                        setWinner(finalWinner);
                        setCurrentName(finalWinner.name);
                        setIsDrawing(false);
                        triggerConfetti();
                    }
                }, 100);
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-fade-in">
                    <div className="lg:col-span-1 space-y-4">
                        <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                            <h3 className="font-bold text-slate-800 flex items-center gap-2 mb-4 border-b pb-3">
                                <Filter size={18} className="text-indigo-500" /> Filtros do Sorteio
                            </h3>
                            
                            <div className="space-y-5">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Formas de Pagamento</label>
                                    <MultiSelectDropdown 
                                        options={paymentOptions}
                                        selected={selectedMethods}
                                        onChange={toggleMethod}
                                        placeholder="Todas as Formas"
                                        disabled={isDrawing}
                                    />
                                    <p className="text-[10px] text-slate-400 mt-2 flex items-center gap-1">
                                        * Vazio = Todos participam.
                                    </p>
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Valor Mínimo Gasto</label>
                                    <MoneyInput 
                                        value={minSpent} 
                                        onChange={setMinSpent} 
                                        disabled={isDrawing}
                                        className="w-full p-3 pl-10 border border-slate-200 rounded-xl bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none disabled:opacity-60"
                                    />
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Mínimo de Compras</label>
                                    <input 
                                        type="number" 
                                        min="1"
                                        value={minPurchases}
                                        onChange={e => setMinPurchases(e.target.value)}
                                        className="w-full p-3 border border-slate-200 rounded-xl bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none font-bold disabled:opacity-60"
                                        disabled={isDrawing}
                                    />
                                </div>
                            </div>
                        </div>

                        <div className="bg-indigo-50 p-4 rounded-2xl border border-indigo-100">
                            <div className="flex justify-between items-center">
                                <span className="text-sm font-bold text-indigo-800">Participantes Elegíveis:</span>
                                <span className="text-2xl font-black text-indigo-600 bg-white px-3 py-1 rounded-lg shadow-sm">
                                    {eligibleCustomers.length}
                                </span>
                            </div>
                        </div>
                    </div>

                    <div className="lg:col-span-2">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 h-full flex flex-col items-center justify-center text-center min-h-[400px]">
                            
                            <div className="w-full max-w-lg mb-8">
                                <div className={`slot-machine border-4 ${winner ? 'border-yellow-400' : isDrawing ? 'border-indigo-400' : 'border-slate-200'} rounded-3xl p-8 mb-6 relative overflow-hidden transition-colors duration-300`}>
                                    
                                    <h2 className={`text-3xl md:text-4xl font-black uppercase tracking-wider truncate px-4 ${winner ? 'text-indigo-700 scale-110' : 'text-slate-700'} transition-transform duration-300`}>
                                        {currentName}
                                    </h2>

                                    {winner && (
                                        <div className="absolute -top-3 -right-3">
                                            <span className="bg-yellow-400 text-yellow-900 text-xs font-bold px-3 py-1 rounded-full shadow-md rotate-12 inline-block">
                                                VENCEDOR!
                                            </span>
                                        </div>
                                    )}
                                </div>

                                {winner && (
                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 text-left animate-fade-in space-y-2 mb-6">
                                        <p className="text-xs font-bold text-slate-400 uppercase">Estatísticas do Ganhador</p>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <p className="text-xs text-slate-500">Total Gasto</p>
                                                <p className="font-bold text-emerald-600">{formatCurrency(winner.totalSpent)}</p>
                                            </div>
                                            <div>
                                                <p className="text-xs text-slate-500">Compras</p>
                                                <p className="font-bold text-slate-700">{winner.purchaseCount} pedidos</p>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>

                            <button 
                                onClick={startDraw} 
                                disabled={isDrawing || eligibleCustomers.length === 0}
                                className={`w-full max-w-sm py-4 rounded-2xl font-black text-lg tracking-wide uppercase transition-all shadow-xl 
                                    ${isDrawing || eligibleCustomers.length === 0 
                                        ? 'bg-slate-200 text-slate-400 cursor-not-allowed shadow-none' 
                                        : 'bg-indigo-600 text-white hover:bg-indigo-700 hover:scale-105 active:scale-95 shadow-indigo-200'}`}
                            >
                                {isDrawing ? 'Sorteando...' : 'Sortear Agora!'}
                            </button>
                            
                            {eligibleCustomers.length === 0 && (
                                <p className="text-red-500 text-sm mt-4 font-medium flex items-center gap-1">
                                    <AlertTriangle size={16}/> Nenhum cliente atende aos filtros.
                                </p>
                            )}

                        </div>
                    </div>
                </div>
            );
        };

        // --- COMPONENTE DE SORTEIO NUMÉRICO ---
        const NumericDraw = () => {
            const [minNum, setMinNum] = useState(1);
            const [maxNum, setMaxNum] = useState(100);
            const [isDrawing, setIsDrawing] = useState(false);
            const [currentNumber, setCurrentNumber] = useState('-');
            const [winner, setWinner] = useState(null);

            const triggerConfetti = () => {
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#4f46e5', '#eab308'] });
            };

            const startDraw = () => {
                const min = parseInt(minNum);
                const max = parseInt(maxNum);
                
                if (isNaN(min) || isNaN(max) || min >= max) {
                    alert("O valor máximo deve ser maior que o mínimo.");
                    return;
                }

                setIsDrawing(true);
                setWinner(null);

                let iterations = 0;
                const maxIterations = 25;
                
                const interval = setInterval(() => {
                    const randomNum = Math.floor(Math.random() * (max - min + 1)) + min;
                    setCurrentNumber(randomNum);
                    iterations++;

                    if (iterations >= maxIterations) {
                        clearInterval(interval);
                        const finalWinner = Math.floor(Math.random() * (max - min + 1)) + min;
                        setWinner(finalWinner);
                        setCurrentNumber(finalWinner);
                        setIsDrawing(false);
                        triggerConfetti();
                    }
                }, 100);
            };

            return (
                <div className="max-w-3xl mx-auto animate-fade-in">
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 h-full flex flex-col items-center justify-center text-center">
                        
                        <div className="flex gap-4 w-full max-w-md mb-8">
                            <div className="flex-1">
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Mínimo</label>
                                <input 
                                    type="number" 
                                    value={minNum}
                                    onChange={e => setMinNum(e.target.value)}
                                    className="w-full p-4 border border-slate-200 rounded-xl bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none text-center font-bold text-xl"
                                    disabled={isDrawing}
                                />
                            </div>
                            <div className="flex-1">
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Máximo</label>
                                <input 
                                    type="number" 
                                    value={maxNum}
                                    onChange={e => setMaxNum(e.target.value)}
                                    className="w-full p-4 border border-slate-200 rounded-xl bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none text-center font-bold text-xl"
                                    disabled={isDrawing}
                                />
                            </div>
                        </div>

                        <div className="w-full max-w-md mb-8">
                            <div className={`slot-machine border-4 ${winner ? 'border-yellow-400 bg-yellow-50' : isDrawing ? 'border-indigo-400' : 'border-slate-200'} rounded-full aspect-square flex items-center justify-center mb-6 relative overflow-hidden transition-colors duration-300 w-64 h-64 mx-auto shadow-inner`}>
                                
                                <h2 className={`text-6xl md:text-8xl font-black ${winner ? 'text-indigo-700 scale-110' : 'text-slate-700'} transition-transform duration-300`}>
                                    {currentNumber}
                                </h2>

                            </div>
                        </div>

                        <button 
                            onClick={startDraw} 
                            disabled={isDrawing}
                            className={`w-full max-w-sm py-4 rounded-2xl font-black text-lg tracking-wide uppercase transition-all shadow-xl 
                                ${isDrawing 
                                    ? 'bg-slate-200 text-slate-400 cursor-not-allowed shadow-none' 
                                    : 'bg-indigo-600 text-white hover:bg-indigo-700 hover:scale-105 active:scale-95 shadow-indigo-200'}`}
                        >
                            {isDrawing ? 'Sorteando...' : 'Sortear Número'}
                        </button>
                    </div>
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [userProfile, setUserProfile] = useState(null);
            const [loadingAuth, setLoadingAuth] = useState(true);
            const [accessDenied, setAccessDenied] = useState(false);

            const [customers, setCustomers] = useState([]);
            const [sales, setSales] = useState([]);
            const [loadingData, setLoadingData] = useState(true);

            // Tab Manager
            const [activeTab, setActiveTab] = useState('dashboard'); 

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
                    if (currentUser) {
                        try {
                            const profileRef = doc(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'profile', 'info');
                            const profileSnap = await getDoc(profileRef);

                            if (profileSnap.exists()) {
                                const data = profileSnap.data();
                                if (data.approved) { 
                                    setUserProfile(data); 
                                    setUser(currentUser); 
                                } else { 
                                    setAccessDenied(true); 
                                    await signOut(auth); 
                                }
                            } else {
                                await signOut(auth);
                            }
                        } catch (e) {
                            console.error(e);
                            await signOut(auth);
                        }
                    } else {
                        setUser(null); 
                        setUserProfile(null);
                    }
                    setLoadingAuth(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                
                const customersRef = collection(db, 'artifacts', APP_ID, 'users', user.uid, 'customers');
                const salesRef = collection(db, 'artifacts', APP_ID, 'users', user.uid, 'sales');
                
                const unsubC = onSnapshot(query(customersRef), s => setCustomers(s.docs.map(d => ({id:d.id, ...d.data()}))));
                const unsubS = onSnapshot(query(salesRef), s => { 
                    setSales(s.docs.map(d => ({id:d.id, ...d.data()}))); 
                    setLoadingData(false); 
                });
                
                return () => { unsubC(); unsubS(); };
            }, [user]);

            const handleLogout = async () => {
                await signOut(auth);
                window.location.reload();
            };

            if (loadingAuth) return <div className="min-h-screen flex items-center justify-center bg-slate-50 text-indigo-500 font-bold">A verificar acesso...</div>;
            
            if (accessDenied) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-red-50 p-6 text-center">
                    <Lock size={48} className="text-red-500 mb-4" />
                    <h1 className="text-2xl font-bold text-red-800 mb-2">Acesso Negado</h1>
                    <p className="text-red-600 mb-6">Cadastro pendente de aprovação no sistema principal.</p>
                    <button onClick={() => window.location.reload()} className="px-6 py-3 bg-red-600 text-white font-bold rounded-xl">Voltar</button>
                </div>
            );

            if (!user) return <AuthScreen />;

            return (
                <div className="min-h-screen pb-24 font-sans text-slate-800 flex flex-col">
                    <header className="bg-indigo-900 text-white p-4 lg:p-6 rounded-b-3xl shadow-lg sticky top-0 z-40 w-full mb-6">
                        <div className="max-w-6xl mx-auto">
                            <div className="flex justify-between items-center mb-6">
                                <div className="flex items-center gap-3">
                                    <div className="bg-indigo-800 p-2.5 rounded-xl shadow-inner">
                                        <Trophy className="text-yellow-400" size={24} />
                                    </div>
                                    <div>
                                        <h1 className="text-xl lg:text-2xl font-bold text-white leading-tight">CRM Aura</h1>
                                        <p className="text-xs text-indigo-300">Sorteios, Fidelidade & Dados • {userProfile?.storeName}</p>
                                    </div>
                                </div>
                                <button onClick={handleLogout} className="bg-indigo-800 p-2.5 rounded-full text-red-300 hover:bg-indigo-700 hover:text-red-200 transition-colors" title="Sair">
                                    <LogOut size={20} />
                                </button>
                            </div>
                            
                            {/* Tabs Navigation */}
                            <div className="flex space-x-2 bg-indigo-950/40 p-1.5 rounded-xl border border-indigo-800/50 overflow-x-auto hide-scrollbar">
                                <button 
                                    onClick={() => setActiveTab('dashboard')} 
                                    className={`flex-1 min-w-[140px] py-2.5 px-3 rounded-lg font-bold text-sm flex items-center justify-center gap-2 transition-all ${activeTab === 'dashboard' ? 'bg-white text-indigo-900 shadow-md scale-[1.02]' : 'text-indigo-200 hover:text-white hover:bg-indigo-800/50'}`}
                                >
                                    <BarChart3 size={18} /> <span className="whitespace-nowrap">Indicadores</span>
                                </button>
                                <button 
                                    onClick={() => setActiveTab('loyalty')} 
                                    className={`flex-1 min-w-[140px] py-2.5 px-3 rounded-lg font-bold text-sm flex items-center justify-center gap-2 transition-all ${activeTab === 'loyalty' ? 'bg-white text-indigo-900 shadow-md scale-[1.02]' : 'text-indigo-200 hover:text-white hover:bg-indigo-800/50'}`}
                                >
                                    <Star size={18} className={activeTab === 'loyalty' ? "text-yellow-500 fill-yellow-500" : ""} /> 
                                    <span className="whitespace-nowrap">Fidelidade</span>
                                </button>
                                <button 
                                    onClick={() => setActiveTab('customers')} 
                                    className={`flex-1 min-w-[140px] py-2.5 px-3 rounded-lg font-bold text-sm flex items-center justify-center gap-2 transition-all ${activeTab === 'customers' ? 'bg-white text-indigo-900 shadow-md scale-[1.02]' : 'text-indigo-200 hover:text-white hover:bg-indigo-800/50'}`}
                                >
                                    <Users size={18} /> <span className="whitespace-nowrap">Sorteio Clientes</span>
                                </button>
                                <button 
                                    onClick={() => setActiveTab('numeric')} 
                                    className={`flex-1 min-w-[140px] py-2.5 px-3 rounded-lg font-bold text-sm flex items-center justify-center gap-2 transition-all ${activeTab === 'numeric' ? 'bg-white text-indigo-900 shadow-md scale-[1.02]' : 'text-indigo-200 hover:text-white hover:bg-indigo-800/50'}`}
                                >
                                    <Hash size={18} /> <span className="whitespace-nowrap">Sorteio Numérico</span>
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 p-4 max-w-6xl mx-auto w-full">
                        {loadingData ? (
                            <div className="flex flex-col items-center justify-center py-20 text-indigo-400">
                                <div className="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-500 mb-4"></div>
                                <p className="font-bold">A sincronizar sistema...</p>
                            </div>
                        ) : (
                            <>
                                {activeTab === 'dashboard' && <DashboardCRM customers={customers} sales={sales} storeName={userProfile?.storeName || 'Nossa Loja'} />}
                                {activeTab === 'customers' && <CustomerDraw customers={customers} sales={sales} />}
                                {activeTab === 'numeric' && <NumericDraw />}
                                {activeTab === 'loyalty' && <LoyaltyProgram customers={customers} sales={sales} storeName={userProfile?.storeName || 'Nossa Loja'} />}
                            </>
                        )}
                    </main>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
